name: MacKnock Pro
options:
  bundleIdPrefix: com.macknockpro
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "15.0"
  createIntermediateGroups: true
  defaultConfig: Debug

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"

targets:
  MacKnock Pro:
    type: application
    platform: macOS
    sources:
      - path: MacKnock Pro
        excludes:
          - "*.xcassets/AppIcon.appiconset/*.png"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.macknockpro.app
        PRODUCT_NAME: MacKnock Pro
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_FILE: "MacKnock Pro/Info.plist"
        CODE_SIGN_ENTITLEMENTS: "MacKnock Pro/MacKnock_Pro.entitlements"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_HARDENED_RUNTIME: true
        CODE_SIGN_IDENTITY: "-"
        APP_SANDBOX: false
        GENERATE_INFOPLIST_FILE: false
        COMBINE_HIDPI_IMAGES: true
        LD_RUNPATH_SEARCH_PATHS:
          - "$(inherited)"
          - "@executable_path/../Frameworks"
        SWIFT_EMIT_LOC_STRINGS: true
        SWIFT_OPTIMIZATION_LEVEL: "-Onone"
      configs:
        Debug:
          SWIFT_OPTIMIZATION_LEVEL: "-Onone"
          DEBUG_INFORMATION_FORMAT: "dwarf-with-dsym"
        Release:
          SWIFT_OPTIMIZATION_LEVEL: "-O"
          DEBUG_INFORMATION_FORMAT: "dwarf-with-dsym"
